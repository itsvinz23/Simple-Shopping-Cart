<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 140" role="img" aria-label="Animated shopping flow">
  <style>
    .label { font: 600 13px "Segoe UI", Arial, sans-serif; fill: #1a1f16; }
    .sub { font: 11px "Segoe UI", Arial, sans-serif; fill: #5c6656; }
  </style>
  <rect width="820" height="140" rx="12" fill="#f6f4ef" stroke="#e2ddd2"/>

  <g transform="translate(50 45)">
    <rect width="100" height="56" rx="10" fill="#fff" stroke="#2d6a4f" stroke-width="2"/>
    <text x="50" y="26" text-anchor="middle" class="label">Browse</text>
    <text x="50" y="44" text-anchor="middle" class="sub">Categories</text>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
  </g>

  <path d="M160 73 H200" stroke="#2d6a4f" stroke-width="2" stroke-dasharray="6 4">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" repeatCount="indefinite"/>
  </path>
  <polygon points="200,73 192,68 192,78" fill="#2d6a4f"/>

  <g transform="translate(220 45)">
    <rect width="100" height="56" rx="10" fill="#fff" stroke="#2d6a4f" stroke-width="2"/>
    <text x="50" y="26" text-anchor="middle" class="label">Add</text>
    <text x="50" y="44" text-anchor="middle" class="sub">To cart</text>
    <animateTransform attributeName="transform" type="translate" values="220 45;220 40;220 45" dur="1.5s" begin="0.2s" repeatCount="indefinite" additive="sum"/>
  </g>

  <path d="M330 73 H370" stroke="#2d6a4f" stroke-width="2" stroke-dasharray="6 4">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" begin="0.3s" repeatCount="indefinite"/>
  </path>
  <polygon points="370,73 362,68 362,78" fill="#2d6a4f"/>

  <g transform="translate(390 45)">
    <rect width="100" height="56" rx="10" fill="#fff" stroke="#2d6a4f" stroke-width="2"/>
    <text x="50" y="26" text-anchor="middle" class="label">Cart</text>
    <text x="50" y="44" text-anchor="middle" class="sub">Edit qty</text>
    <circle cx="88" cy="12" r="10" fill="#c1121f">
      <animate attributeName="r" values="10;12;10" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="88" y="16" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
  </g>

  <path d="M500 73 H540" stroke="#2d6a4f" stroke-width="2" stroke-dasharray="6 4">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" begin="0.6s" repeatCount="indefinite"/>
  </path>
  <polygon points="540,73 532,68 532,78" fill="#2d6a4f"/>

  <g transform="translate(560 45)">
    <rect width="100" height="56" rx="10" fill="#2d6a4f"/>
    <text x="50" y="26" text-anchor="middle" fill="#fff" class="label">Checkout</text>
    <text x="50" y="44" text-anchor="middle" fill="#d8f3dc" class="sub">Summary</text>
    <animate attributeName="opacity" values="0.9;1;0.9" dur="1.8s" repeatCount="indefinite"/>
  </g>

  <path d="M670 73 H710" stroke="#2d6a4f" stroke-width="2" stroke-dasharray="6 4">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" begin="0.9s" repeatCount="indefinite"/>
  </path>
  <polygon points="710,73 702,68 702,78" fill="#2d6a4f"/>

  <g transform="translate(730 45)">
    <rect width="60" height="56" rx="28" fill="#fff" stroke="#40916c" stroke-width="2"/>
    <text x="30" y="34" text-anchor="middle" font-size="22"></text>
    <animateTransform attributeName="transform" type="scale" values="1;1.08;1" dur="2s" repeatCount="indefinite" additive="sum" transform-origin="760 73"/>
  </g>
</svg>
